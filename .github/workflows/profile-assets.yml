name: Generate profile assets

on:
  schedule:
    # 03:10 Europe/Istanbul
    - cron: "10 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate 3D contribution calendar
        uses: yoshi389111/github-profile-3d-contrib@v0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Build softened 3D map angle
        shell: bash
        run: |
          cp profile-3d-contrib/profile-night-rainbow.svg profile-3d-contrib/profile-night-rainbow-soft.svg
          python -c 'from pathlib import Path; path = Path("profile-3d-contrib/profile-night-rainbow-soft.svg"); svg = path.read_text(); svg = svg.replace("skewY(-30)", "skewY(-24)").replace("skewY(30)", "skewY(24)").replace("skewX(40.89)", "skewX(35)"); path.write_text(svg)'

      - name: Generate focused 2026 activity graph
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          ACTIVITY_START: "2026-02-01"
        run: python .github/scripts/render-activity-focus.py

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib profile-assets
          if git diff --cached --quiet; then
            echo "No generated asset changes."
          else
            git commit -m "chore: update generated profile assets"
            git push
          fi
