  <path id="motionPath" d="M95 53L123 81L151 109L179 137L207 109L235 81L263 53L291 81L319 109L347 137L375 109L403 81L431 53L459 81L487 109L515 137L543 109L571 81L599 53L627 81L655 109L683 137L711 109L739 81L767 53L795 81" stroke="url(#trail)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
