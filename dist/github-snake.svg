<svg width="900" height="180" viewBox="0 0 900 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Contribution animation placeholder</title>
  <desc id="desc">A light contribution trail placeholder that is replaced daily by GitHub Actions.</desc>
  <defs>
    <linearGradient id="trail" x1="80" y1="90" x2="820" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#70A5FD"/>
      <stop offset=".55" stop-color="#50FA7B"/>
      <stop offset="1" stop-color="#BF91F3"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-90%" width="140%" height="280%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="900" height="180" rx="18" fill="#F6F8FA"/>
  <g opacity=".75">
