<svg width="900" height="420" viewBox="0 0 900 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated 3D contribution calendar placeholder</title>
  <desc id="desc">A dark 3D-style contribution map placeholder that is replaced daily by GitHub Actions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#080D1D"/>
      <stop offset="0.48" stop-color="#111C36"/>
      <stop offset="1" stop-color="#173B57"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8BE9FD"/>
      <stop offset="0.48" stop-color="#70A5FD"/>
      <stop offset="1" stop-color="#BF91F3"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="420" rx="22" fill="url(#bg)"/>
  <path d="M0 322C138 270 216 348 350 298C492 244 548 114 694 135C795 149 835 221 900 174V420H0V322Z" fill="#70A5FD" opacity=".08"/>
  <text x="54" y="70" fill="#FFFFFF" font-family="Segoe UI, Ubuntu, sans-serif" font-size="32" font-weight="700">Samet's contribution terrain</text>
  <text x="55" y="102" fill="#9FB3D9" font-family="Segoe UI, Ubuntu, sans-serif" font-size="15">Live 3D calendar is generated by GitHub Actions after the workflow runs.</text>

  <g transform="translate(135 298) skewY(-17) scale(1.08 .82)" filter="url(#glow)">
    <g opacity=".35" stroke="#31466F" stroke-width="1">
      <path d="M0 0H585"/>
      <path d="M0 -34H585"/>
      <path d="M0 -68H585"/>
      <path d="M0 -102H585"/>
      <path d="M0 -136H585"/>
      <path d="M0 -170H585"/>
      <path d="M0 0V-170"/>
      <path d="M45 0V-170"/>
      <path d="M90 0V-170"/>
      <path d="M135 0V-170"/>
      <path d="M180 0V-170"/>
      <path d="M225 0V-170"/>
      <path d="M270 0V-170"/>
      <path d="M315 0V-170"/>
      <path d="M360 0V-170"/>
      <path d="M405 0V-170"/>
      <path d="M450 0V-170"/>
      <path d="M495 0V-170"/>
      <path d="M540 0V-170"/>
      <path d="M585 0V-170"/>
    </g>

    <g fill="url(#bar)">
      <rect x="18" y="-44" width="22" height="44" rx="4"><animate attributeName="height" values="44;68;44" dur="3.5s" repeatCount="indefinite"/></rect>
      <rect x="63" y="-88" width="22" height="88" rx="4"><animate attributeName="height" values="88;112;88" dur="4.2s" repeatCount="indefinite"/></rect>
      <rect x="108" y="-54" width="22" height="54" rx="4"><animate attributeName="height" values="54;82;54" dur="3.8s" repeatCount="indefinite"/></rect>
      <rect x="153" y="-126" width="22" height="126" rx="4"><animate attributeName="height" values="126;150;126" dur="4.8s" repeatCount="indefinite"/></rect>
      <rect x="198" y="-68" width="22" height="68" rx="4"><animate attributeName="height" values="68;96;68" dur="3.9s" repeatCount="indefinite"/></rect>
      <rect x="243" y="-104" width="22" height="104" rx="4"><animate attributeName="height" values="104;132;104" dur="4.4s" repeatCount="indefinite"/></rect>
      <rect x="288" y="-46" width="22" height="46" rx="4"><animate attributeName="height" values="46;72;46" dur="3.6s" repeatCount="indefinite"/></rect>
      <rect x="333" y="-148" width="22" height="148" rx="4"><animate attributeName="height" values="148;170;148" dur="5s" repeatCount="indefinite"/></rect>
      <rect x="378" y="-82" width="22" height="82" rx="4"><animate attributeName="height" values="82;118;82" dur="4.1s" repeatCount="indefinite"/></rect>
      <rect x="423" y="-58" width="22" height="58" rx="4"><animate attributeName="height" values="58;90;58" dur="3.7s" repeatCount="indefinite"/></rect>
      <rect x="468" y="-118" width="22" height="118" rx="4"><animate attributeName="height" values="118;146;118" dur="4.6s" repeatCount="indefinite"/></rect>
      <rect x="513" y="-74" width="22" height="74" rx="4"><animate attributeName="height" values="74;104;74" dur="4s" repeatCount="indefinite"/></rect>
    </g>
  </g>

  <g transform="translate(55 343)">
    <rect width="194" height="34" rx="17" fill="#FFFFFF" opacity=".08"/>
    <circle cx="22" cy="17" r="5" fill="#50FA7B">
      <animate attributeName="opacity" values=".35;1;.35" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="38" y="22" fill="#DCE7FF" font-family="Segoe UI, Ubuntu, sans-serif" font-size="13" font-weight="600">awaiting first refresh</text>
  </g>
</svg>
